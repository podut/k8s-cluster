apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wp-site1

resources:
  - ../../wordpress-base

namePrefix: ""

patches:
  - target:
      kind: Secret
      name: wp-secrets
    patch: |
      - op: replace
        path: /stringData/MYSQL_ROOT_PASSWORD
        value: site1root123
      - op: replace
        path: /stringData/MYSQL_PASSWORD
        value: site1pass123
      - op: replace
        path: /stringData/WORDPRESS_DB_PASSWORD
        value: site1pass123
  - target:
      kind: Ingress
      name: wordpress-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: site1.local
  - target:
      kind: Ingress
      name: phpmyadmin-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: pma-site1.local
  - target:
      kind: Service
      name: wordpress
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30081
  - target:
      kind: Service
      name: phpmyadmin
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 31181
