apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wp-site3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:6-php8.2-apache
          command: ["apache2-foreground"]
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb-fantoma.wp-site3.svc.cluster.local
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              value: "parola123"
            - name: WORDPRESS_DB_NAME
              value: wordpress
          livenessProbe:
            httpGet:
              path: /readme.html
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readme.html
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              cpu: "100m"
              memory: "256Mi"
