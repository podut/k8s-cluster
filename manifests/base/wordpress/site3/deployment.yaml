---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wp-site3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mariadb.wp-site3.svc.cluster.local 3306; do
                echo "Waiting for MariaDB...";
                sleep 2;
              done
              echo "MariaDB is ready!";
        - name: init-wordpress
          image: wordpress:6.5.2-apache
          command:
            - sh
            - -c
            - |
              # Copy WordPress files to volume if empty
              if [ -f /var/www/html/index.php ]; then
                echo "WordPress files already present.";
              else
                echo "WordPress files not found in volume. Copying...";
                cp -r /usr/src/wordpress/. /var/www/html/;
                chown -R www-data:www-data /var/www/html;
              fi
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
      containers:
        - name: wordpress
          image: wordpress:6.5.2-apache
          command: ["apache2-foreground"]
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb.wp-site3.svc.cluster.local
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: WORDPRESS_DB_PASSWORD
            - name: WORDPRESS_DB_NAME
              value: wordpress
            - name: APACHE_SERVER_NAME
              value: localhost
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              cpu: "100m"
              memory: "256Mi"
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wp-site3
spec:
  selector:
    app: wordpress
  ports:
    - port: 80
      targetPort: 80
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wp-site3
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wp-site3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: wordpress
            - name: MYSQL_USER
              value: wordpress
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              cpu: "100m"
              memory: "256Mi"
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
  namespace: wp-site3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-pvc
  namespace: wp-site3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: wp-secrets
  namespace: wp-site3
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "VALUE_FROM_VAULT"
  MYSQL_PASSWORD: "VALUE_FROM_VAULT"
  WORDPRESS_DB_PASSWORD: "VALUE_FROM_VAULT"
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wp-site3

resources:
  - ../../wordpress-base

patches:
  - target:
      kind: Secret
      name: wp-secrets
    patch: |
      - op: replace
        path: /stringData/MYSQL_ROOT_PASSWORD
        value: VALUE_FROM_VAULT
      - op: replace
        path: /stringData/MYSQL_PASSWORD
        value: VALUE_FROM_VAULT
      - op: replace
        path: /stringData/WORDPRESS_DB_PASSWORD
        value: VALUE_FROM_VAULT
  - target:
      kind: Ingress
      name: wordpress-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: site3.local
  - target:
      kind: Ingress
      name: phpmyadmin-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: pma-site3.local
  - target:
      kind: Service
      name: wordpress
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30083
  - target:
      kind: Service
      name: phpmyadmin
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 31183
  - target:
      kind: Deployment
      name: wordpress
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: wordpress:6.5.2-apache
  - target:
      kind: Deployment
      name: wordpress
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
        value: /
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 30
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 60