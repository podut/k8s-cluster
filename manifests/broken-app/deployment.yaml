# --- manifests/broken-app/deployment.yaml ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
        - name: nginx
          image: nginx:stable  # Changed from nonexistent-tag to a valid tag
          ports:
            - containerPort: 80
