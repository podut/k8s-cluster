apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster
  namespace: monitoring
data:
  # DASHBOARD 1: General Cluster Infrastructure
  cluster-infrastructure.json: |
    {
      "title": "1. Cluster Infrastructure",
      "uid": "cluster-infra",
      "panels": [
        {
          "title": "Nodes Ready",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(kube_node_status_condition{condition='Ready',status='true'})" }]
        },
        {
          "title": "Total Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase='Running'})" }]
        },
        {
          "title": "Network Traffic (Download) - KiB/s",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum(irate(container_network_receive_bytes_total{id='/'}[5m])) by (node) / 1024" }]
        },
        {
          "title": "Network Traffic (Upload) - KiB/s",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{ "expr": "sum(irate(container_network_transmit_bytes_total{id='/'}[5m])) by (node) / 1024" }]
        }
      ]
    }

  # DASHBOARD 2: Autoscaling Performance
  autoscaling-overview.json: |
    {
      "title": "2. Autoscaling Performance",
      "uid": "autoscaling-perf",
      "panels": [
        {
          "title": "Current Worker Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(kube_node_info{node=~'worker-.*'})" }]
        },
        {
          "title": "Pending Pods (Scaling Trigger)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase='Pending'})" }]
        },
        {
          "title": "CPU Requests vs Allocatable (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            { "expr": "sum(kube_pod_container_resource_requests{resource='cpu'}) by (node) / sum(kube_node_status_allocatable{resource='cpu'}) by (node) * 100", "legendFormat": "Usage {{node}}" },
            { "expr": "80", "legendFormat": "Scale Up Threshold (80%)" },
            { "expr": "30", "legendFormat": "Scale Down Threshold (30%)" }
          ]
        },
        {
          "title": "Memory Requests vs Allocatable (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            { "expr": "sum(kube_pod_container_resource_requests{resource='memory'}) by (node) / sum(kube_node_status_allocatable{resource='memory'}) by (node) * 100", "legendFormat": "Usage {{node}}" },
            { "expr": "80", "legendFormat": "Scale Up Threshold (80%)" },
            { "expr": "30", "legendFormat": "Scale Down Threshold (30%)" }
          ]
        }
      ]
    }

  # DASHBOARD 3: Site Billing
  site-billing.json: |
    {
      "title": "3. Site Billing & Resources",
      "uid": "site-billing",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "query": "label_values(kube_namespace_labels, namespace)",
            "refresh": 1,
            "regex": "/wp-site.*/"
          }
        ]
      },
      "panels": [
        {
          "title": "Current CPU Usage (Cores)",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='$namespace'}[5m]))" }]
        },
        {
          "title": "Current Memory (MiB)",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 0 },
          "targets": [{ "expr": "sum(container_memory_usage_bytes{namespace='$namespace'}) / 1024 / 1024" }]
        },
        {
          "title": "Total Network Traffic (MB)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 0 },
          "targets": [{ "expr": "sum(container_network_receive_bytes_total{namespace='$namespace'} + container_network_transmit_bytes_total{namespace='$namespace'}) / 1024 / 1024" }]
        }
      ]
    }
  vault-overview.json: |
    {
      "title": "4. Vault Security Overview",
      "uid": "vault-overview",
      "panels": [
        {
          "title": "Vault Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_status_phase{namespace='vault', phase='Running'})" }],
          "fieldConfig": { "defaults": { "mappings": [{ "type": "value", "options": { "1": { "text": "ONLINE", "color": "green" }, "0": { "text": "OFFLINE", "color": "red" } } }] } }
        },
        {
          "title": "Vault Memory Usage (MiB)",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum(container_memory_usage_bytes{namespace='vault'}) / 1024 / 1024" }]
        },
        {
          "title": "Vault CPU Load (Cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{ "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='vault'}[5m]))" }]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pods
  namespace: monitoring
data:
  pod-resources.json: |
    {
      "title": "5. Pod Resources (CPU, Memory, Disk)",
      "uid": "pod-resources",
      "timezone": "browser",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 1,
            "multi": false,
            "allValue": ""
          },
          {
            "name": "pod",
            "type": "query",
            "query": "label_values(kube_pod_info{namespace='$namespace'}, pod)",
            "refresh": 1,
            "multi": true,
            "allValue": ".*"
          }
        ]
      },
      "panels": [
        {
          "title": "Pod CPU Usage (Cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='$namespace', pod=~'$pod', container!='POD'}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Pod Memory Usage (MiB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace='$namespace', pod=~'$pod', container!='POD'}) by (pod) / 1024 / 1024",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Pod Memory RSS (MiB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_rss{namespace='$namespace', pod=~'$pod', container!='POD'}) by (pod) / 1024 / 1024",
              "legendFormat": "{{pod}} - RSS"
            }
          ]
        },
        {
          "title": "Pod Disk Usage (GiB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace='$namespace'} / 1024 / 1024 / 1024",
              "legendFormat": "{{persistentvolumeclaim}}"
            }
          ]
        },
        {
          "title": "Pod Disk Available (GiB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "kubelet_volume_stats_available_bytes{namespace='$namespace'} / 1024 / 1024 / 1024",
              "legendFormat": "{{persistentvolumeclaim}} - Available"
            }
          ]
        },
        {
          "title": "Pod Disk Usage %",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace='$namespace'} / kubelet_volume_stats_capacity_bytes{namespace='$namespace'} * 100",
              "legendFormat": "{{persistentvolumeclaim}}"
            }
          ]
        }
      ]
    }
