# Secretele sunt gestionate prin HashiCorp Vault
# Vault Agent Injector va injecta secretele automat in pod
#
# Vault path: secret/data/cluster-agent
# Keys: GEMINI_API_KEY, DEEPSEEK_API_KEY, GITHUB_TOKEN
#
# Pentru setup manual (fara Vault):
#   kubectl create secret generic cluster-agent-secrets \
#     --from-literal=GEMINI_API_KEY=<key> \
#     --from-literal=DEEPSEEK_API_KEY=<key> \
#     --from-literal=GITHUB_TOKEN=<token> \
#     -n cluster-agent
