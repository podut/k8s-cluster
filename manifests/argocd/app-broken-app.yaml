apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: broken-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/podut/k8s-cluster.git
    targetRevision: main
    path: manifests/apps/broken-app
  destination:
    server: https://kubernetes.default.svc
    namespace: broken-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
