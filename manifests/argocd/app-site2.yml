apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-site2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea.gitea.svc:3000/argocd/k8s-apps.git
    targetRevision: main
    path: sites/site2
  destination:
    server: https://kubernetes.default.svc
    namespace: wp-site2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
