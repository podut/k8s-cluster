apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster
  namespace: monitoring
data:
  cluster-overview.json: |
    {
      "title": "Cluster & Autoscaling Overview",
      "uid": "cluster-autoscaling",
      "panels": [
        {
          "title": "Nodes Status (Ready)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(kube_node_status_condition{condition='Ready',status='true'})" }]
        },
        {
          "title": "Total Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase='Running'})" }]
        },
        {
          "title": "CPU Usage per Node (Cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum(rate(container_cpu_usage_seconds_total{id='/'}[5m])) by (node)" }]
        },
        {
          "title": "Memory Usage per Node (GiB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{ "expr": "sum(container_memory_usage_bytes{id='/'}) by (node) / 1024 / 1024 / 1024" }]
        },
        {
          "title": "Network Traffic (Download) - KiB/s",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [{ "expr": "sum(irate(container_network_receive_bytes_total{id='/'}[5m])) by (node) / 1024" }]
        },
        {
          "title": "Network Traffic (Upload) - KiB/s",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [{ "expr": "sum(irate(container_network_transmit_bytes_total{id='/'}[5m])) by (node) / 1024" }]
        }
      ]
    }
