---
- name: Prepare all K8s nodes
  hosts: k8s_cluster
  gather_facts: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - socat
          - conntrack
          - ebtables
          - ethtool
        state: present

    - name: Disable swap
      shell: swapoff -a
      ignore_errors: yes

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent
      ignore_errors: yes

    - name: Load kernel modules
      shell: |
        modprobe overlay || true
        modprobe br_netfilter || true

    - name: Ensure kernel modules load on boot
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf

    - name: Set sysctl params for K8s
      copy:
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        dest: /etc/sysctl.d/k8s.conf

    - name: Apply sysctl params
      shell: sysctl --system
      ignore_errors: yes

    - name: Add /etc/hosts entries
      shell: |
        grep -q 'controller-1' /etc/hosts || echo '172.20.0.11 controller-1
        172.20.0.12 controller-2
        172.20.0.13 controller-3
        172.20.0.21 worker-1
        172.20.0.22 worker-2' >> /etc/hosts
